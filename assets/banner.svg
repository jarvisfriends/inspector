<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Geneva, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB020"/>
      <stop offset="1" stop-color="#FFE066"/>
    </linearGradient>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2E1E"/>
      <stop offset="1" stop-color="#2A2012"/>
    </linearGradient>
    <g id="spark4">
      <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#FFF9E3"/>
    </g>
  </defs>

  <rect x="8" y="8" width="1184" height="404" rx="28" fill="url(#bg)"/>

  <use href="#spark4" x="130" y="80" opacity="0.9"/>
  <use href="#spark4" x="1090" y="70" opacity="0.7"/>
  <use href="#spark4" x="1110" y="320" opacity="0.6"/>
  <use href="#spark4" x="105" y="330" opacity="0.6"/>

  <!-- pawprint-style clue dots wandering toward the bug -->
  <g fill="#8A5A00" opacity="0.5">
    <circle cx="240" cy="330" r="7"/>
    <circle cx="300" cy="310" r="7"/>
    <circle cx="360" cy="322" r="7"/>
    <circle cx="420" cy="300" r="7"/>
  </g>

  <!-- the inspector: deerstalker hat, HUGE glasses, one comically magnified eye -->
  <g transform="translate(310,180)">
    <!-- head -->
    <circle r="95" fill="#FFDFB8" stroke="#5A3A18" stroke-width="7"/>
    <!-- ears of the deerstalker -->
    <path d="M-95,-18 q-34,-6 -30,-42 q26,-6 40,16 Z" fill="#B5651D" stroke="#5A3A18" stroke-width="6"/>
    <path d="M95,-18 q34,-6 30,-42 q-26,-6 -40,16 Z" fill="#B5651D" stroke="#5A3A18" stroke-width="6"/>
    <!-- deerstalker cap -->
    <path d="M-92,-30 Q-80,-108 0,-108 Q80,-108 92,-30 Q40,-52 0,-52 Q-40,-52 -92,-30 Z" fill="#C97B3D" stroke="#5A3A18" stroke-width="7"/>
    <!-- houndstooth-ish checks -->
    <g fill="#A85C22">
      <rect x="-58" y="-92" width="18" height="18" rx="4" transform="rotate(-14 -49 -83)"/>
      <rect x="-12" y="-102" width="18" height="18" rx="4"/>
      <rect x="34" y="-94" width="18" height="18" rx="4" transform="rotate(12 43 -85)"/>
    </g>
    <!-- front brim -->
    <path d="M-92,-30 Q0,-64 92,-30 Q60,-16 0,-18 Q-60,-16 -92,-30 Z" fill="#B5651D" stroke="#5A3A18" stroke-width="6"/>
    <!-- top bow -->
    <ellipse cx="0" cy="-108" rx="16" ry="9" fill="#B5651D" stroke="#5A3A18" stroke-width="5"/>
    <!-- glasses: right lens comically magnified -->
    <g>
      <circle cx="-38" cy="8" r="30" fill="#FFF9E3" stroke="#5A3A18" stroke-width="8"/>
      <circle cx="52" cy="10" r="52" fill="#DFF6FF" stroke="#5A3A18" stroke-width="8" opacity="0.96"/>
      <line x1="-8" y1="8" x2="0" y2="9" stroke="#5A3A18" stroke-width="8" stroke-linecap="round"/>
      <!-- normal eye -->
      <circle cx="-38" cy="10" r="7" fill="#5A3A18"/>
      <!-- magnified eye -->
      <circle cx="52" cy="12" r="20" fill="#5A3A18"/>
      <circle cx="59" cy="4" r="6" fill="#FFF9E3"/>
      <!-- lens shine -->
      <path d="M20,-16 A44,44 0 0 1 48,-38" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
    </g>
    <!-- mustache + smile -->
    <path d="M-26,58 Q-8,48 0,58 Q8,48 26,58 Q10,72 0,66 Q-10,72 -26,58 Z" fill="#8A5A2B" stroke="#5A3A18" stroke-width="4"/>
    <!-- blush -->
    <ellipse cx="-72" cy="42" rx="12" ry="7" fill="#FFB98A"/>
  </g>

  <!-- arm holding the magnifying glass over the terminal -->
  <g transform="translate(690,205)">
    <!-- terminal window under inspection -->
    <rect x="-160" y="-110" width="320" height="220" rx="16" fill="url(#term)" stroke="#1E1608" stroke-width="6"/>
    <circle cx="-138" cy="-89" r="7" fill="#FF6B8B"/>
    <circle cx="-117" cy="-89" r="7" fill="#FFD93D"/>
    <circle cx="-96" cy="-89" r="7" fill="#6BFFB8"/>
    <!-- log lines -->
    <g fill="#6B5A38">
      <rect x="-138" y="-64" width="180" height="10" rx="5"/>
      <rect x="-138" y="-40" width="120" height="10" rx="5"/>
      <rect x="-138" y="-16" width="200" height="10" rx="5"/>
      <rect x="-138" y="32" width="150" height="10" rx="5"/>
      <rect x="-138" y="56" width="90" height="10" rx="5"/>
      <rect x="-138" y="80" width="170" height="10" rx="5"/>
    </g>
    <!-- one WARN line highlighted -->
    <rect x="-138" y="8" width="220" height="10" rx="5" fill="#FFD93D"/>

    <!-- the bug! sitting on the warn line, blown up by the lens -->
    <g transform="translate(104,10) scale(1.9)">
      <ellipse cx="0" cy="0" rx="16" ry="13" fill="#FF5D73" stroke="#5A1220" stroke-width="4"/>
      <line x1="0" y1="-13" x2="0" y2="13" stroke="#5A1220" stroke-width="3"/>
      <circle cx="-6" cy="-4" r="3" fill="#5A1220"/>
      <circle cx="7" cy="3" r="3" fill="#5A1220"/>
      <circle cx="-5" cy="6" r="3" fill="#5A1220"/>
      <circle cx="0" cy="-13" r="6" fill="#5A1220"/>
      <line x1="-4" y1="-18" x2="-8" y2="-24" stroke="#5A1220" stroke-width="3" stroke-linecap="round"/>
      <line x1="4" y1="-18" x2="8" y2="-24" stroke="#5A1220" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- magnifying glass over the bug -->
    <g transform="translate(104,10)">
      <line x1="42" y1="42" x2="118" y2="112" stroke="#5A3A18" stroke-width="18" stroke-linecap="round"/>
      <circle r="58" fill="#F2FBFF" opacity="0.28"/>
      <circle r="58" fill="none" stroke="#B5651D" stroke-width="12"/>
      <circle r="58" fill="none" stroke="#5A3A18" stroke-width="4"/>
      <path d="M-38,-26 A46,46 0 0 1 -10,-46" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="600" y="382" text-anchor="middle" font-size="64" font-weight="bold" fill="#FFFFFF" letter-spacing="4">inspector</text>
  <text x="600" y="408" text-anchor="middle" font-size="19" fill="#6B4A00" opacity="0.9">debug any charm app — every clue in one overlay</text>
</svg>
