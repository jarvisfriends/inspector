version: 2

project_name: inspector

before:
  hooks:
    - go mod tidy
    - go -C tools/releasetag mod tidy

builds:
  - id: inspector
    binary: inspector
    main: ./cmd/inspector
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

release:
  github:
    owner: jarvisfriends
    name: inspector
  extra_files:
    - glob: cmd/inspector/demo.gif
